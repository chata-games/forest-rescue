<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#13391f" />
  <title>Forest Rescue: Heartwood — The Trail</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- The Trail: the campaign-start map. Route lines, nodes, state, labels, and
       hit regions are all rendered here from the campaign manifest; generated
       art supplies scenery only. Shown on first launch; the battle mounts after
       a level is entered. -->
  <section id="trailScreen" class="trail" aria-label="Campaign trail map">
    <header class="trail__header">
      <h1 class="trail__title" id="trailTitle">Forest Rescue: Heartwood</h1>
      <p class="trail__subtitle">Follow the Trail to the Heartwood. Select a level to inspect it.</p>
    </header>

    <div id="trailMap" class="trail__map" role="group" aria-label="Trail levels">
      <!-- Route polyline and level node buttons are built from the manifest by main.ts. -->
    </div>

    <p class="trail__legend" aria-hidden="true">
      <span class="trail__chip trail__chip--current">Available</span>
      <span class="trail__chip trail__chip--cleared">Cleared</span>
      <span class="trail__chip trail__chip--locked">Locked</span>
    </p>
  </section>

  <!-- Compact level detail surface (the pre-battle brief). Native <dialog> gives
       focus management, ESC to dismiss, and an accessible modal role for free. -->
  <dialog id="trailDetail" class="detail" aria-labelledby="detailTitle">
    <div class="detail__panel">
      <h2 id="detailTitle" class="detail__title"></h2>
      <p id="detailBlurb" class="detail__blurb"></p>
      <p id="detailMeta" class="detail__meta"></p>
      <p id="detailRewards" class="detail__rewards"></p>
      <p id="detailUnlock" class="detail__unlock" role="note"></p>
      <div class="detail__actions">
        <button id="detailBack" class="detail__back" type="button" autofocus>Back to Trail</button>
        <button id="detailEnter" class="primary-btn" type="button">Enter</button>
      </div>
    </div>
  </dialog>

  <!-- Battle view: the semantic DOM/CSS HUD + Phaser battlefield. Hidden until a
       level is entered from the Trail. -->
  <div id="battleRoot" class="app-root" hidden>
    <header class="hud" role="banner" aria-label="Battle heads-up display">
      <div class="hud__title" id="levelName">Meadow's Edge</div>

      <!-- Author preview controls: level picker + phone-layout toggle. -->
      <label class="hud__picker">
        <span class="hud__label" aria-hidden="true">Level</span>
        <select id="levelSelect" aria-label="Preview level"></select>
      </label>
      <button id="layoutBtn" class="hud__btn" type="button" aria-label="Toggle phone layout">Layout: auto</button>

      <div class="hud__stat" aria-label="Mana available">
        <span class="hud__label" aria-hidden="true">Mana</span>
        <span class="hud__value" id="manaValue" aria-live="polite">150</span>
      </div>

      <div class="hud__stat" aria-label="Hearts remaining">
        <span class="hud__label" aria-hidden="true">Hearts</span>
        <span class="hud__value" id="heartsValue" aria-live="polite">♥♥♥♥♥</span>
      </div>

      <div class="hud__stat" aria-label="Wave progress">
        <span class="hud__label" aria-hidden="true">Wave</span>
        <span class="hud__value" id="waveValue" aria-live="polite">1 / 8</span>
      </div>

      <button id="pauseBtn" class="hud__btn" type="button" aria-pressed="false" aria-label="Pause battle">Pause</button>
    </header>

    <div class="stage-wrap">
      <!-- The production Phaser battlefield mounts here. -->
      <main class="stage" id="game-root" role="img" aria-label="Forest Rescue battlefield"></main>

      <!-- Author preview legend: routes, hazards, waves, metrics, simulation
           summaries. Hidden unless ?preview=1. -->
      <aside id="previewPanel" class="preview" aria-label="Level preview summary" hidden></aside>

      <!-- Modeless Defender context panel (issue #30): inspect, upgrade, or
           remove the Defender on a tapped occupied ring without dropping the
           selected placement tool. Non-modal — the battlefield stays live. -->
      <section id="contextPanel" class="context-panel" role="region" aria-label="Defender context panel" hidden>
        <div class="context-panel__head">
          <h3 id="cpTitle" class="context-panel__title"></h3>
          <button id="cpClose" class="context-panel__close" type="button" aria-label="Close context panel">×</button>
        </div>
        <p id="cpTier" class="context-panel__tier"></p>
        <ul id="cpStats" class="context-panel__stats"></ul>
        <div class="context-panel__block">
          <p id="cpUpgradeSummary" class="context-panel__line"></p>
          <p id="cpUpgradeDetail" class="context-panel__line context-panel__detail" hidden></p>
          <button id="cpUpgradeBtn" class="context-panel__action" type="button">Upgrade</button>
        </div>
        <div class="context-panel__block">
          <p id="cpRemoveSummary" class="context-panel__line"></p>
          <div id="cpConfirm" class="context-panel__confirm" hidden>
            <p id="cpConfirmText" class="context-panel__line context-panel__detail"></p>
            <div class="context-panel__confirm-actions">
              <button id="cpConfirmBtn" class="primary-btn" type="button">Confirm remove</button>
              <button id="cpCancelBtn" class="context-panel__action" type="button">Cancel</button>
            </div>
          </div>
          <button id="cpRemoveBtn" class="context-panel__action context-panel__action--danger" type="button">Remove</button>
        </div>
      </section>
    </div>

    <nav class="toolbar" aria-label="Defender selection">
      <button class="tool" data-defender="sprig-sentinel" type="button" aria-pressed="true">
        <span class="tool__name">Sprig Sentinel</span>
        <span class="tool__cost">50 mana</span>
      </button>
      <button class="tool" data-defender="thornvine-bramble" type="button" aria-pressed="false">
        <span class="tool__name">Thornvine Bramble</span>
        <span class="tool__cost">35 mana</span>
      </button>
    </nav>

    <!-- Guardian spells (issue #31): armed with select-then-target casting.
         Built per level from the unlocked spells; buttons are disabled and
         explain themselves while on cooldown or unaffordable. -->
    <nav id="spellbar" class="spellbar" aria-label="Guardian spells" hidden></nav>

    <div class="start-row">
      <button id="startBtn" class="primary-btn" type="button">Start Wave</button>
      <button id="undoBtn" class="hud__btn" type="button" disabled aria-label="Undo last placement (Z)">Undo</button>
      <output id="hint" class="hint" role="status" aria-live="polite"></output>
    </div>

    <section id="outcomeOverlay" class="overlay" role="dialog" aria-modal="true" aria-live="assertive" hidden>
      <div class="overlay__panel">
        <h2 id="outcomeTitle">Victory</h2>
        <p id="outcomeStars" class="overlay__stars" aria-live="polite"></p>
        <p id="outcomeMessage"></p>
        <div class="overlay__actions">
          <button id="replayBtn" class="overlay__btn" type="button">Play Again</button>
          <button id="returnToTrailBtn" class="primary-btn" type="button">Return to Trail</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./main.ts"></script>
</body>

</html>
