name: Levelgen CI

on:
  push:
    paths:
      - 'forest-rescue/**'
  pull_request:
    paths:
      - 'forest-rescue/**'

jobs:
  levelgen:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forest-rescue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: forest-rescue/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: git diff --exit-code levels/compiled/
      - run: npm run validate
      - run: npm test
